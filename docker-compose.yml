services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pv-simulator-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////workspace/pv_simulator.db
      - WORKSPACE_ROOT=/workspace
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app:rw
      - .:/workspace:ro
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pv-simulator-network

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pv-simulator-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pv-simulator-network

  # Redis service (for caching and task queue)
  redis:
    image: redis:7-alpine
    container_name: pv-simulator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - pv-simulator-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  pv-simulator-network:
    driver: bridge

volumes:
  redis-data:
    driver: local

